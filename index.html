<title>FBI APP — FBI APP</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:       #1a3a5c;
  --navy-dark:  #122840;
  --navy-mid:   #2a5080;
  --sky:        #cce8f8;
  --sky-light:  #e8f4fc;
  --sky-mid:    #a8d4f0;
  --white:      #ffffff;
  --off-white:  #f4f8fc;
  --text:       #1a1a1a;
  --text2:      #4a5568;
  --text3:      #8a9ab0;
  --border:     #c0d8ec;
  --border2:    #ddeaf5;
  --gold:       #c8a020;
  --gold-bg:    #fdf6e3;
  --danger-bg:  #fce8e8; --danger-text: #8b1a1a; --danger-border: #f5b8b8;
  --warn-bg:    #fef3dc; --warn-text:   #7a4a00; --warn-border:   #f5d080;
  --success-bg: #e6f4ea; --success-text:#1a5c2a;
  --verde:      #1a7a3c;
  --azul:       #1a5fa8;
  --azul-oscuro:#0d3d70;
  --azul-claro: #ddeeff;
  --rojo:       #a02020;
  --practica:   #2a7a4a;
  --torneo:     #1a5fa8;
  --r-sm: 6px; --r-md: 10px; --r-lg: 14px;
}
html, body { height: 100%; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  font-size: 15px; color: var(--text);
  background: var(--off-white);
  -webkit-tap-highlight-color: transparent;
}

/* ── HEADER ── */
.app-header {
  background: linear-gradient(135deg, #122840 0%, #2a5080 100%);
  padding: 12px 14px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 3px solid #4a8ab8;
  box-shadow: 0 3px 12px rgba(18,40,64,0.45);
  position: sticky; top: 0; z-index: 100;
}
.header-texts { display: flex; flex-direction: column; gap: 2px; flex: 1; }
.header-title { font-size: 18px; font-weight: 800; color: #ffffff; line-height: 1.2; letter-spacing:.02em; }
.header-sub   { font-size: 10px; color: rgba(255,255,255,.55); font-weight: 600; letter-spacing: .06em; text-transform:uppercase; }
.header-name  { font-size: 13px; color: #f0c040; font-weight: 700; margin-top: 2px; letter-spacing:.01em; }

/* ── NAV TABS ── */
.nav-wrap {
  background: var(--navy-dark);
  border-bottom: 2px solid var(--sky-mid);
  position: sticky; top: 80px; z-index: 99;
}
.tabs { display: grid; grid-template-columns: repeat(3,1fr); }
.tab {
  padding: 8px 4px; border: none; background: none; cursor: pointer;
  font-size: 10px; font-weight: 600; color: rgba(255,255,255,.5);
  border-bottom: 3px solid transparent; margin-bottom: -2px;
  text-align: center; line-height: 1.3; transition: color 0.15s;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  -webkit-tap-highlight-color: transparent;
}
.tab .tab-icon { font-size: 20px; }
.tab:hover { color: rgba(255,255,255,.85); }
.tab.active { color: var(--white); border-bottom-color: var(--sky-mid); }

/* ── LAYOUT ── */
.container { padding: 12px 12px 120px; max-width: 600px; margin: 0 auto; }
.section { display: none; } .section.active { display: block; }

/* ── CARD ── */
.card {
  background: var(--white); border: 1px solid var(--border2);
  border-radius: var(--r-lg); margin-bottom: 12px;
  box-shadow: 0 1px 4px rgba(26,58,92,.07); overflow: hidden;
}
.card-header {
  background: var(--navy); color: var(--white);
  padding: 10px 14px; font-size: 12px; font-weight: 700;
  letter-spacing: .05em; text-transform: uppercase;
  display: flex; justify-content: space-between; align-items: center;
}
.card-body { padding: 14px; }

/* ── FORMS ── */
.field { margin-bottom: 10px; }
.field:last-child { margin-bottom: 0; }
label { font-size: 11px; color: var(--text2); display: block; margin-bottom: 4px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
input[type=text], input[type=number], input[type=date], select {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border);
  border-radius: var(--r-sm); font-size: 15px; color: var(--text);
  background: var(--white); outline: none; -webkit-appearance: none; appearance: none;
}
input:focus, select:focus { border-color: var(--navy-mid); box-shadow: 0 0 0 3px rgba(42,80,128,.12); }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 11px 18px; border: 1px solid var(--border); border-radius: var(--r-sm);
  background: var(--white); cursor: pointer; font-size: 14px; font-weight: 600;
  color: var(--text2); transition: background .15s; min-height: 44px;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { opacity: .75; }
.btn-primary { background: var(--navy); color: var(--white); border-color: var(--navy); width: 100%; }
.btn-primary:active { background: var(--navy-dark); }
.btn-danger { color: var(--danger-text); border-color: var(--danger-border); }
.btn-danger:active { background: var(--danger-bg); }
.btn-sm { padding: 8px 12px; font-size: 13px; min-height: 36px; }
.btn-verde { background: var(--verde); color: #fff; border-color: var(--verde); }
.btn-azul  { background: var(--azul); color: #fff; border-color: var(--azul); }

/* ── ALERTS ── */
.alert { padding: 10px 14px; border-radius: var(--r-sm); font-size: 13px; margin-bottom: 10px; border-left: 3px solid; }
.alert-warn { background: var(--warn-bg); color: var(--warn-text); border-color: var(--warn-text); }
.alert-info { background: var(--sky-light); color: var(--navy); border-color: var(--navy-mid); }
.alert-success { background: var(--success-bg); color: var(--success-text); border-color: var(--success-text); }

/* ── BADGES ── */
.badge { display: inline-block; font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 700; border: 1px solid; white-space:nowrap; }
.d0 { background:#ede8ff; color:#2d1a8a; border-color:#a090d0; }
.d1 { background:#e0f5ea; color:#0a4a20; border-color:#70b080; }
.d2 { background:#ddeeff; color:#0a3060; border-color:#70a0c0; }
.d3 { background:#fff3dc; color:#5a3000; border-color:#c09040; }
.d4 { background:#e8f5d8; color:#1a4000; border-color:#80a840; }
.d5 { background:#ffe8f0; color:#5a0020; border-color:#c07090; }
.d6 { background:#e8f0ff; color:#001a5a; border-color:#7090c0; }
.mr1 { background:#e8ffe8; color:#004000; border-color:#40a040; }
.mr2 { background:#d8f0d8; color:#003000; border-color:#30a030; }
.mr3 { background:#fff0d8; color:#503000; border-color:#b07030; }
.mr4 { background:#f0d8ff; color:#400050; border-color:#9050b0; }
.badge-practica { background:#e6f4ea; color:#1a5c2a; border-color:#70b080; }
.badge-torneo   { background:#ddeeff; color:#0a3060; border-color:#70a0c0; }

/* ── ZONA INPUTS ── */
.zona-col  { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.zona-lbl  { font-size: 15px; font-weight: 700; }
.zi { width: 48px; text-align: center; padding: 6px 2px; font-size: 20px; font-weight: 700; border-radius: var(--r-sm); border: 2px solid #ccc; }
.zi::-webkit-outer-spin-button, .zi::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.zi[type=number] { -moz-appearance: textfield; }

/* ── HISTORIAL CARD ── */
.sesion-card {
  border: 1px solid var(--border2); border-radius: var(--r-md);
  padding: 12px 14px; margin-bottom: 8px; background: var(--white);
  box-shadow: 0 1px 3px rgba(26,58,92,.05);
}
.sesion-card.tipo-torneo { border-left: 4px solid var(--azul); }
.sesion-card.tipo-practica { border-left: 4px solid var(--verde); }

/* ── GRÁFICO ── */
.chart-wrap { width: 100%; overflow-x: auto; padding: 6px 0; }
canvas { display: block; }

/* ── STATS ── */
.stat-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
.stat-box {
  flex: 1; min-width: 80px; background: var(--sky-light); border: 1px solid var(--border);
  border-radius: var(--r-md); padding: 10px 8px; text-align: center;
}
.stat-val { font-size: 22px; font-weight: 800; color: var(--navy-dark); }
.stat-lbl { font-size: 10px; color: var(--text3); font-weight: 700; text-transform: uppercase; letter-spacing: .04em; margin-top: 2px; }

/* ── RECORD ── */
.record-banner {
  background: var(--gold-bg); border: 2px solid var(--gold);
  border-radius: var(--r-md); padding: 12px 14px; text-align: center; margin-bottom: 12px;
}

/* ── ONBOARDING ── */
.onboard-wrap {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 20px; background: var(--off-white);
}
.onboard-box {
  background: var(--white); border: 1px solid var(--border2);
  border-radius: var(--r-lg); max-width: 380px; width: 100%;
  box-shadow: 0 4px 20px rgba(26,58,92,.12); overflow: hidden;
}
.onboard-head {
  background: var(--navy); padding: 20px 18px; text-align: center;
}
.onboard-head img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }
.onboard-title { font-size: 18px; font-weight: 800; color: #fff; margin-top: 10px; }
.onboard-sub   { font-size: 12px; color: var(--sky-mid); margin-top: 4px; }
.onboard-body  { padding: 20px 18px; }

/* ── MODO SELECTOR ── */
.modo-btn {
  width: 100%; padding: 14px 16px; border-radius: var(--r-md);
  border: 2px solid var(--border); background: var(--white);
  cursor: pointer; text-align: left; margin-bottom: 8px; transition: all .15s;
}
.modo-btn:hover { border-color: var(--navy-mid); background: var(--sky-light); }
.modo-btn.selected { border-color: var(--navy); background: var(--sky-light); }
.modo-btn-title { font-size: 14px; font-weight: 700; color: var(--text); }
.modo-btn-desc  { font-size: 12px; color: var(--text2); margin-top: 3px; }

/* ── MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.55); z-index: 999;
  align-items: center; justify-content: center; padding: 20px;
}
.modal-box {
  background: var(--white); border-radius: var(--r-lg);
  max-width: 340px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,.2); overflow: hidden;
}
.modal-head {
  background: var(--navy); padding: 14px 18px;
  display: flex; align-items: center; justify-content: space-between;
}
.modal-head-title { font-size: 15px; font-weight: 700; color: var(--white); }
.modal-close {
  background: none; border: 1.5px solid rgba(168,212,240,.4); border-radius: 50%;
  width: 30px; height: 30px; color: var(--white); font-size: 15px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.modal-body { padding: 16px 18px; font-size: 13px; color: var(--text2); }
.modal-sub  { font-size: 12px; color: var(--text3); margin-top: 6px; }
.modal-btns { padding: 0 18px 18px; display: flex; gap: 8px; }
.modal-btns .btn { flex: 1; }

/* ── FOOTER ── */
.sticky-footer {
  background: var(--navy-dark); border-top: 2px solid var(--sky-mid);
  padding: 10px 16px; text-align: center;
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 90;
}
.sticky-footer-top   { font-size: 10px; color: var(--sky-mid); letter-spacing: .04em; text-transform: uppercase; font-weight: 600; margin-bottom: 3px; }
.sticky-footer-names { font-size: 11px; color: rgba(255,255,255,.75); font-weight: 500; }

/* ── RESPONSIVE ── */
@media(max-width:480px){
  .header-title { font-size: 14px; }
  .container { padding: 10px 10px 110px; }
  .tab .tab-icon { font-size: 18px; }
  .tab { font-size: 9px; }
  input[type=text], input[type=number], select { font-size: 16px; }
  .zi { width: 44px; font-size: 14px; }
  .stat-val { font-size: 18px; }
}
</style>
</head>

    <div class="onboard-body">
      <div class="field">
        <label>Tu apellido</label>
        <input type="text" id="ob-apellido" placeholder="Ej: González" autocomplete="off">
      </div>
      <div class="field">
        <label>Tu nombre</label>
        <input type="text" id="ob-nombre" placeholder="Ej: Martín" autocomplete="off">
      </div>
      <div class="field">
        <label>División</label>
        <select id="ob-div">
          <option value="" disabled selected>— Seleccioná tu división —</option>
          <optgroup label="Pistola / Revólver">
            <option value="1">Oficial Revólver</option>
            <option value="2">Libre Revólver</option>
            <option value="3">Oficial Pistola</option>
            <option value="4">Oficial Pistola Promocional</option>
            <option value="5">Pistola 22 Oficial</option>
            <option value="6">Pistola 22 Promocional</option>
          </optgroup>
          <optgroup label="Minirifle">
            <option value="mr1">Minirifle</option>
            <option value="mr2">Minirifle Promocional</option>
            <option value="mr3">PCC</option>
            <option value="mr4">Kit Roni</option>
          </optgroup>
        </select>
      </div>
      <div class="field">
        <label>Categoría</label>
        <select id="ob-cat">
          <option value="g">General</option>
          <option value="s">Veterano</option>
          <option value="l">Lady</option>
        </select>
      </div>

      <div style="margin-top:16px;margin-bottom:8px">
        <div style="font-size:11px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px">Modo de series por defecto</div>
        <button class="modo-btn selected" id="ob-modo-ind" onclick="selModoOb(false)">
          <div class="modo-btn-title">📋 8 series individuales</div>
          <div class="modo-btn-desc">Ensayo + 8 series — máx. 5 disparos por zona</div>
        </button>
        <button class="modo-btn" id="ob-modo-agr" onclick="selModoOb(true)">
          <div class="modo-btn-title">📋 4 bloques agrupados</div>
          <div class="modo-btn-desc">Ensayo + 4 bloques (2 series c/u) — máx. 10 disparos por zona</div>
        </button>
      </div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:12px">Podés cambiar el modo en cada sesión.</div>

      <button class="btn btn-primary" style="font-size:15px;min-height:50px" onclick="guardarPerfil()">

  {key:'z5',label:'5',col:'#1a7a3c'},
  {key:'z4',label:'4',col:'#1a5fa8'},
  {key:'z3',label:'3',col:'#a06010'},
  {key:'z2',label:'2',col:'#6030a0'},
  {key:'z0',label:'0',col:'#a02020'},
];
const ZONAS_MINIRIFLE=[
  {key:'z10i',label:'10i',col:'#7a1a7a'},
  {key:'z10',label:'10',col:'#1a7a3c'},
  {key:'z9',label:'9',col:'#1a5fa8'},
  {key:'z8',label:'8',col:'#a06010'},
  {key:'z7',label:'7',col:'#6030a0'},
  {key:'z0',label:'0',col:'#a02020'},
];
// ZONAS activo (se sobreescribe al iniciar división)
let ZONAS=ZONAS_PISTOLA.slice();

function getZonasForModalidad(m){ return m==='minirifle'?ZONAS_MINIRIFLE:ZONAS_PISTOLA; }
function getMaxDisparos(si, modoAgrupado, modalidad){
  if(si===0) return 5;
  if(modalidad==='minirifle') return 10;
  return modoAgrupado?10:5;
}
function calcSerie(s, modalidad){
  const zonas=getZonasForModalidad(modalidad||'pistola');
  let imp=0, pts=0;
  zonas.forEach(z=>{
    if(z.key!=='z0'){ imp+=(s[z.key]||0); pts+=(s[z.key]||0)*parseInt(z.label.replace('i','')); }
  });
  return{imp,pts};
}

function divInfo(k, modalidad){
  const list=getDivsForModalidad(modalidad||'pistola');
  return list.find(d=>d.key===String(k))||list[0];
}
function catInfo(k){ return CATS.find(c=>c.key===k)||CATS[0]; }
function badgeDiv(k, modalidad){ const d=divInfo(k,modalidad); return `<span class="badge ${d.cls}">${d.label}</span>`; }

/* ── TABS ── */
function showTab(t, btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('sec-'+t).classList.add('active');
  if(t==='nueva') renderPantallaPrincipal();
  if(t==='historial') renderHistorial();
  if(t==='estadisticas') renderEstadisticas();
}

function renderPantallaPrincipal(){

function crearEvento(){
  const evento=document.getElementById('ns-evento').value.trim();
  const fecha=document.getElementById('ns-fecha').value;
  const errEl=document.getElementById('err-evento');
  if(!evento){
    errEl.textContent='⚠ Ingresá el nombre del torneo/evento';
    errEl.style.display='block';
    return;
  }
  const duplicado=sesiones.find(s=>s.evento.trim().toLowerCase()===evento.toLowerCase());
  if(duplicado){
    errEl.textContent=`⚠ Ya existe un evento llamado "${duplicado.evento}" (${formatFecha(duplicado.fecha)}). Usá un nombre diferente.`;
    errEl.style.display='block';
    return;
  }
  if(!fecha){ alert('Elegí una fecha'); return; }
  nsModoAgrupado=perfil.modoAgrupado||false;
  eventoActual={ id:Date.now(), fecha, evento, tipo:nsTipo, divisiones:[] };
  divActual=null;
  renderAgregarDivision();
}

function selModoNSDiv(agr){
  nsModoAgrupado=agr;
  document.getElementById('ns-modo-ind').classList.toggle('selected',!agr);
  document.getElementById('ns-modo-agr').classList.toggle('selected',agr);
}

function iniciarDivision(){
  const divKey=document.getElementById('ns-div').value;
  if(!divKey){
    const errD=document.getElementById('err-div');
    if(errD) errD.style.display='block';
    return;
  }
  const turnoEl=document.getElementById('ns-turno');
  const turno=turnoEl?parseInt(turnoEl.value)||null:null;
  const lineaEl=document.getElementById('ns-linea');
  const linea=lineaEl?parseInt(lineaEl.value)||null:null;
  if(eventoActual.tipo==='torneo'){
    let valid=true;
    const errT=document.getElementById('err-turno');
    const errL=document.getElementById('err-linea');
    if(!turno){ if(errT) errT.style.display='block'; valid=false; }
    if(!linea){ if(errL) errL.style.display='block'; valid=false; }
    if(!valid) return;
  }
  // validar duplicado: misma división Y mismo turno
  if(eventoActual.divisiones.find(d=>d.div===divKey&&d.turno===turno)){
    const tLbl=turno?` (Turno ${turno})`:'';
    alert(`Ya cargaste la división "${divInfo(divKey, nsModalidad).label}"${tLbl} en este evento.`);
    return;
  }
  nsModoAgrupado=perfil.modoAgrupado||false;
  const totalSer=nsModoAgrupado?4:8;
  const zonas=getZonasForModalidad(nsModalidad);
  const emptyS={};
  zonas.forEach(z=>emptyS[z.key]=0);
  const series=[];
  for(let i=0;i<=totalSer;i++) series.push(Object.assign({},emptyS));
  divActual={
    div: divKey,
    modalidad: nsModalidad,
    modoAgrupado: nsModoAgrupado,
    turno: turno,
    linea: linea,
    series,
    serieActiva: 0,
    completadas: []
  };
  ZONAS=getZonasForModalidad(nsModalidad);
  DIVS=getDivsForModalidad(nsModalidad);
  renderCargaPuntajes();
}

function editarDivision(idx){
  divActual=eventoActual.divisiones.splice(idx,1)[0];
  divActual._borrador=false;
  // abrir la primera serie no completada
  const totalSer=divActual.modoAgrupado?4:8;
  let nextSerie=null;
  for(let i=0;i<=totalSer;i++){
    if(!divActual.completadas.includes(i)){ nextSerie=i; break; }
  }
  divActual.serieActiva=nextSerie;
  renderCargaPuntajes();
}

/* ── CARGA DE PUNTAJES (por división) ── */
function renderCargaPuntajes(){
  const cont=document.getElementById('nueva-content');
  const ev=eventoActual;

      </div>
      <div class="card-body" style="padding:10px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px">
          <div style="font-size:12px;color:var(--text3)">📅 ${fechaFmt} · ${modoLbl}</div>
          <div style="display:flex;gap:6px;align-items:center">
            ${s.turno?`<span style="font-size:11px;background:#e8f0ff;color:#1a3a8c;border:1px solid #a0b8e0;border-radius:20px;padding:2px 8px;font-weight:700">T${s.turno}</span>`:''}
            ${s.linea?`<span style="font-size:11px;background:#fff3dc;color:#7a4a00;border:1px solid #d4a040;border-radius:20px;padding:2px 8px;font-weight:700">L${s.linea}</span>`:''}
            <span class="badge ${divI.cls}">${divI.label}</span>
          </div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${labels.map((lbl,i)=>{
            const comp=s.completadas.includes(i);
            const act=s.serieActiva===i;
            let cls='btn'; let sty='min-width:52px;font-size:13px;font-weight:700;';
            if(act) cls+=' btn-primary';
            else if(comp) sty+='background:#d1fae5;border-color:#6ee7b7;color:#065f46;';
            return `<button class="${cls}" style="${sty}" onclick="selSerieActual(${i})">
              ${comp&&!act?'✓ ':''}${lbl}
            </button>`;
          }).join('')}
        </div>
      </div>
    </div>`;

  // Timer card
  html+=`
    <div class="card" style="padding:16px">
      <div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px">🔫 ¡Tiradores Cargaaar!</div>
      <div style="display:flex;align-items:center;justify-content:center">
        <div style="position:relative;cursor:pointer" onclick="timerPlay()" title="Iniciar / Pausar">
          <svg id="timer-svg" viewBox="0 0 210 210" width="210" height="210">
            <circle cx="105" cy="105" r="90" fill="#f0f4f8" stroke="#e0e8f0" stroke-width="1"/>
            <circle cx="105" cy="105" r="80" fill="none" stroke="#dce6f0" stroke-width="14"/>
            <circle id="timer-arc" cx="105" cy="105" r="80" fill="none"
              stroke="#1a3a5c" stroke-width="14"
              stroke-linecap="round"
              stroke-dasharray="502.65"
              stroke-dashoffset="0"
              transform="rotate(-90 105 105)"/>
            <text id="timer-icon" x="105" y="82" text-anchor="middle"
              font-size="22" fill="#8a9ab0"
              font-family="Segoe UI,system-ui,sans-serif"
              dominant-baseline="middle">▶</text>
            <text x="105" y="112" text-anchor="middle" id="timer-display"
              font-size="46" font-weight="900" fill="#1a3a5c"
              font-family="Segoe UI,system-ui,sans-serif"
              dominant-baseline="middle">1:00</text>
            <text id="timer-label" x="105" y="144" text-anchor="middle"
              font-size="13" fill="#8a9ab0"
              font-family="Segoe UI,system-ui,sans-serif">tocá para iniciar</text>
          </svg>
        </div>
      </div>
    </div>`;

  if(s.serieActiva!==null){
    const si=s.serieActiva;
    const zonasDiv=getZonasForModalidad(s.modalidad||'pistola');
    const maxD=getMaxDisparos(si,s.modoAgrupado,s.modalidad||'pistola');
    const ser=s.series[si];
    const comp=s.completadas.includes(si);
    const serieLbl=si===0?'Ensayo':(s.modoAgrupado?`Bloque ${si} (Series ${si*2-1}-${si*2}) / 4`:`Serie ${si} / 8`);
    const r=calcSerie(ser,s.modalidad||'pistola');

    html+=`
      <div class="card" style="${comp?'opacity:.85':''}">
        <div class="card-header" style="background:${comp?'#6b7280':'var(--navy)'};display:flex;justify-content:space-between;align-items:center">
          <span>${serieLbl}${comp?' <span style="margin-left:8px;font-size:11px;background:rgba(255,255,255,.2);padding:2px 8px;border-radius:20px">✓ OK</span>':''}</span>
          ${comp?`<button class="btn btn-sm" style="background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3);font-size:12px" onclick="editarSerie(${si})">✏️ Editar</button>`:''}
        </div>
        <div class="card-body" style="${comp?'pointer-events:none':''}">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
            <div style="font-size:12px;color:var(--text3)">Máx. ${maxD} disparos por zona</div>
            <div style="display:flex;gap:14px">
              <div style="text-align:center">
                <div style="font-size:9px;color:var(--text3);text-transform:uppercase;font-weight:700">Imp.</div>
                <div style="font-size:20px;font-weight:800;color:var(--azul-oscuro)" id="cur-imp">${r.imp}</div>
              </div>
              <div style="text-align:center">
                <div style="font-size:9px;color:var(--text3);text-transform:uppercase;font-weight:700">Pts.</div>
                <div style="font-size:20px;font-weight:800;color:var(--verde)" id="cur-pts">${r.pts}</div>
              </div>
            </div>
          </div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
            ${zonasDiv.map(({key,label,col})=>`
              <div class="zona-col">
                <span class="zona-lbl" style="color:${col}">${label}</span>
                <input class="zi" type="number" min="0" max="${maxD}" id="zi_${si}_${key}"
                  value="${ser[key]||0}"
                  oninput="setZonaActual(${si},'${key}',this.value)"
                  ${comp?'disabled':''}>
              </div>`).join('')}
          </div>
          <div id="cur-err" style="display:none;font-size:12px;color:var(--rojo);margin-top:8px;text-align:center"></div>

    <div class="card" style="background:var(--sky-light)">
      <div class="card-header" style="background:var(--navy-mid)">Totales — ${divI.label}</div>
      <div class="card-body">
        <div class="stat-row">
          <div class="stat-box"><div class="stat-val">${tot.totImp}</div><div class="stat-lbl">Impactos</div></div>
          <div class="stat-box" style="background:var(--gold-bg);border-color:var(--gold)"><div class="stat-val" style="color:var(--navy-dark)">${tot.totPts}</div><div class="stat-lbl">Puntos</div></div>
          <div class="stat-box"><div class="stat-val">${s.completadas.filter(i=>i>0).length}/${totalSer}</div><div class="stat-lbl">Series</div></div>
        </div>
        ${s.completadas.filter(i=>i>0).length>=totalSer?`
        <button onclick="guardarDivision()" style="display:block;width:100%;min-height:50px;font-size:15px;font-weight:700;margin-bottom:8px;background:#1a7a3c;color:#fff;border:none;border-radius:var(--r-md);cursor:pointer;box-shadow:0 2px 6px rgba(26,122,60,.3)">
          ✅ Guardar tirada
        </button>`:''}
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-danger btn-sm" style="flex:1;min-height:44px;font-size:13px" onclick="descartarDivision()">🗑 Cancelar división</button>
        </div>
      </div>
    </div>`;

  cont.innerHTML=html;
}

function selSerieActual(i){
  divActual.serieActiva=i;
  renderCargaPuntajes();
}

function setZonaActual(si, zona, val){
  const s=divActual.series[si];
  const maxD=getMaxDisparos(si,divActual.modoAgrupado,divActual.modalidad||'pistola');
  const nuevo=Math.max(0,parseInt(val)||0);
  const zonasDiv=getZonasForModalidad(divActual.modalidad||'pistola');
  const otras=zonasDiv.map(z=>z.key).filter(z=>z!==zona);
  const sumaOtras=otras.reduce((a,z)=>a+(s[z]||0),0);
  const err=document.getElementById('cur-err');
  if(sumaOtras+nuevo>maxD){
    const max=Math.max(0,maxD-sumaOtras);
    document.getElementById(`zi_${si}_${zona}`).value=max;
    s[zona]=max;
    if(err){ err.textContent=`⚠ Máx ${maxD} disparos. Ajustado a ${max}.`; err.style.display='block'; }
  } else {
    s[zona]=nuevo;
    if(err) err.style.display='none';
  }
  const r=calcSerie(s);
  const ei=document.getElementById('cur-imp');
  const ep=document.getElementById('cur-pts');
  if(ei) ei.textContent=r.imp;
  if(ep) ep.textContent=r.pts;
}

function completarSerie(si){
  // Validar que no todos los valores estén en 0
  const ser=divActual.series[si];
  const zonas=getZonasForModalidad(divActual.modalidad||'pistola');
  const total=zonas.reduce((a,z)=>a+(ser[z.key]||0),0);
  if(total===0){
    const err=document.getElementById('cur-err');
    if(err){
      err.textContent='⚠ No podés guardar una serie vacía. Ingresá al menos un impacto.';
      err.style.display='block';
    }
    return;
  }
  if(!divActual.completadas.includes(si)) divActual.completadas.push(si);
  // auto-advance to next pending serie
  const totalSer=divActual.modoAgrupado?4:8;
  let next=null;
  for(let i=1;i<=totalSer;i++){
    if(!divActual.completadas.includes(i)){ next=i; break; }
  }
  divActual.serieActiva=next;
  renderCargaPuntajes();
}

function editarSerie(si){
  divActual.completadas=divActual.completadas.filter(i=>i!==si);
  divActual.serieActiva=si;
  renderCargaPuntajes();
}

function guardarDivision(){
  timerStop();
  const tot=calcTotalDivision(divActual);
  eventoActual.divisiones.push({
    div: divActual.div,
    modalidad: divActual.modalidad||'pistola',
    modoAgrupado: divActual.modoAgrupado,
    turno: divActual.turno||null,
    linea: divActual.linea||null,
    series: divActual.series,
    completadas: divActual.completadas,
    totPts: tot.totPts,
    totImp: tot.totImp,
    _borrador: false
  });
  divActual=null;
  renderAgregarDivision();
}

function descartarDivision(){
  abrirModal('¿Descartar esta división?','Se perderán los puntajes cargados.','Descartar','var(--rojo)',
    ()=>{ cerrarModal(); divActual=null; renderAgregarDivision(); }
  );
}
function volverAlEvento(){
  timerStop();
  // Guarda el estado actual de divActual en el evento como borrador y vuelve
  // Si ya existía (edición), lo reinserta; si es nuevo, lo guarda como pendiente
  if(divActual){
    // Calcular totales parciales para mostrar en la lista
    const tot=calcTotalDivision(divActual);
    divActual.totPts=tot.totPts;
    divActual.totImp=tot.totImp;
    divActual._borrador=true;
    // Verificar si ya existe como borrador (edición) — si no, agregar
    const idx=eventoActual.divisiones.findIndex(d=>d._borrador&&d.div===divActual.div&&d.turno===divActual.turno);
    if(idx>=0) eventoActual.divisiones[idx]=divActual;
    else eventoActual.divisiones.push(divActual);
  }
  divActual=null;
  renderAgregarDivision();
}

function guardarEvento(){
  // Filtrar borradores antes de guardar
  const borradores=eventoActual.divisiones.filter(d=>d._borrador);
  if(borradores.length>0){
    abrirModal(
      '¿Guardar con borradores?',
      `Hay ${borradores.length} división${borradores.length>1?'es':''} sin terminar (borrador). Se descartarán al guardar.`,
      'Guardar igual','var(--navy)',
      ()=>{
        cerrarModal();
        eventoActual.divisiones=eventoActual.divisiones.filter(d=>!d._borrador);
        guardarEvento();
      }
    );
    return;
  }
  const totPts=eventoActual.divisiones.reduce((a,d)=>a+d.totPts,0);
  const totImp=eventoActual.divisiones.reduce((a,d)=>a+d.totImp,0);
  sesiones.unshift({
    id: eventoActual.id,
    fecha: eventoActual.fecha,
    evento: eventoActual.evento,
    tipo: eventoActual.tipo,
    divisiones: eventoActual.divisiones,
    totPts, totImp
  });
  save();
  eventoActual=null;
  divActual=null;
  renderFormNuevoEvento();
  const cont=document.getElementById('nueva-content');
  cont.innerHTML=`<div class="alert alert-success" style="font-size:14px;margin-bottom:12px">
    ✅ Evento guardado — <b>${totPts} puntos</b> totales, ${totImp} impactos
  </div>`+cont.innerHTML;
}

function descartarEvento(){
  abrirModal('¿Descartar evento?','Se perderán todos los datos cargados.','Descartar','var(--rojo)',
    ()=>{ cerrarModal(); eventoActual=null; divActual=null; renderFormNuevoEvento(); }
  );
}

/* ── CÁLCULOS ── */
function calcTotalDivision(d){
  const totalSer=d.modoAgrupado?4:8;
  let totImp=0,totPts=0;
  d.series.forEach((sr,i)=>{
    if(i>0&&i<=totalSer){const r=calcSerie(sr,d.modalidad||'pistola');totImp+=r.imp;totPts+=r.pts;}
  });
  return{totImp,totPts};
}

/* ── HISTORIAL ── */
function renderHistorial(){
  const cont=document.getElementById('historial-content');
  if(!sesiones.length){
    cont.innerHTML=`<div class="alert alert-info">Aún no hay eventos guardados.</div>`;
    return;

  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div style="font-size:13px;font-weight:700;color:var(--text2)">${sesiones.length} evento${sesiones.length!==1?'s':''} registrado${sesiones.length!==1?'s':''}</div>
    <button class="btn btn-sm btn-danger" onclick="borrarTodoHistorial()">🗑 Borrar todo</button>
  </div>`;
  sesiones.forEach((s,idx)=>{
    const fechaFmt=formatFecha(s.fecha);
    const tipoCls=s.tipo==='torneo'?'tipo-torneo':'tipo-practica';
    const tipoIcon=s.tipo==='torneo'?'🏆':'🎯';
    const tipoLbl=s.tipo==='torneo'?'Torneo':'Práctica';
    const divsHtml=(s.divisiones||[]).map((d,di)=>{
      const info=divInfo(d.div, d.modalidad||'pistola');
      const modalidad=d.modalidad||'pistola';
      const zonas=getZonasForModalidad(modalidad);
      const detalleId=`hist-det-${idx}-${di}`;
      // series completadas (incluir ensayo si=0)
      const seriesRows=(d.series||[]).map((ser,si)=>{
        if(!d.completadas||!d.completadas.includes(si)) return '';
        const res=calcSerie(ser, modalidad);
        const zonasStr=zonas.filter(z=>z.key!=='z0'&&(ser[z.key]||0)>0).map(z=>`${z.label}×${ser[z.key]}`).join('  ');
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 8px;background:${si===0?'#fffbe6':'#f8faff'};border-radius:4px;border:1px solid ${si===0?'#e0c84a':'#dde6f8'};margin-bottom:2px;font-size:11px">
          <span style="color:${si===0?'#7a5a00':'var(--text3)'};font-weight:600;min-width:36px">${si===0?'Ens':(d.modoAgrupado?'B'+si:'S'+si)}</span>
          <span style="color:var(--text2);flex:1;text-align:center">${zonasStr||'—'}</span>
          <span style="font-weight:700;color:${si===0?'#7a5a00':'var(--verde)'}">${res.pts}pts / ${res.imp}imp${si===0?' (práctica)':''}</span>
        </div>`;
      }).join('');
      const turnoLbl=d.turno?`<span style="font-size:10px;background:#e8f0ff;color:#1a3a8c;border:1px solid #a0b8e0;border-radius:20px;padding:1px 6px;font-weight:700">T${d.turno}</span>`:'';
      const lineaLbl=d.linea?`<span style="font-size:10px;background:#fff3dc;color:#7a4a00;border:1px solid #d4a040;border-radius:20px;padding:1px 6px">L${d.linea}</span>`:'';
      return `<div style="border-bottom:1px solid var(--border2);padding:5px 0">
        <div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;gap:6px">
          <span class="badge ${info.cls}" style="font-size:10px">${info.label}</span>
          ${turnoLbl}${lineaLbl}
          <span style="color:var(--text3);font-size:11px">${d.modoAgrupado?'4 bloques':'8 series'}</span>
          <span style="flex:1;text-align:right"><b style="color:var(--verde)">${d.totPts}</b> pts · <b style="color:var(--azul-oscuro)">${d.totImp}</b> imp</span>
          ${seriesRows?`<button onclick="var el=document.getElementById('${detalleId}');el.style.display=el.style.display==='none'?'block':'none'" style="min-width:26px;min-height:26px;border-radius:50%;background:#e8f0ff;color:var(--navy);border:1px solid #a0b8e0;cursor:pointer;font-size:11px;flex-shrink:0">👁</button>`:''}
        </div>
        ${seriesRows?`<div id="${detalleId}" style="display:none;margin-top:5px;padding:4px 0">${seriesRows}</div>`:''}
      </div>`;
    }).join('');
    html+=`
      <div class="sesion-card ${tipoCls}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:700;color:var(--text)">${tipoIcon} ${s.evento||fechaFmt}</div>
            <div style="font-size:12px;color:var(--text3);margin-top:2px">📅 ${fechaFmt} · ${tipoLbl}</div>
          </div>
          <div style="display:flex;gap:10px;align-items:center;flex-shrink:0">
            <div style="text-align:center">
              <div style="font-size:9px;color:var(--text3);text-transform:uppercase;font-weight:700">Pts</div>
              <div style="font-size:20px;font-weight:800;color:var(--verde)">${s.totPts}</div>
            </div>
            <button class="btn btn-sm btn-danger" style="padding:6px 10px;min-height:34px" onclick="borrarSesion(${idx})">🗑</button>

      </div>`;
  });
  cont.innerHTML=html;
}

function borrarSesion(idx){
  abrirModal('¿Borrar este evento?','No se puede deshacer.','Borrar','var(--rojo)',
    ()=>{ cerrarModal(); sesiones.splice(idx,1); save(); renderHistorial(); }
  );
}
function borrarTodoHistorial(){
  abrirModal('¿Borrar TODO el historial?','Se eliminarán todos los eventos guardados. No se puede deshacer.','Borrar todo','var(--rojo)',
    ()=>{ cerrarModal(); sesiones=[]; save(); renderHistorial(); renderEstadisticas(); }
  );
}

/* ── ESTADÍSTICAS ── */
function renderEstadisticas(){
  const cont=document.getElementById('stats-content');
  if(!sesiones.length){
    cont.innerHTML=`<div class="alert alert-info">Guardá eventos para ver estadísticas.</div>`;
    return;
  }

  // Aplanar todas las divisiones para stats globales
  const allDivs=sesiones.flatMap(s=>(s.divisiones||[]).map(d=>({...d,fecha:s.fecha,tipo:s.tipo,evento:s.evento||s.fecha})));
  const pts=allDivs.map(d=>d.totPts);
  const maxPts=Math.max(...pts,0);
  const minPts=Math.min(...pts,0);
  const avgPts=pts.length?Math.round(pts.reduce((a,b)=>a+b,0)/pts.length):0;
  const torneos=sesiones.filter(s=>s.tipo==='torneo');
  const practicas=sesiones.filter(s=>s.tipo==='practica');
  const mejorDiv=allDivs.find(d=>d.totPts===maxPts);

  let html=``;

  if(maxPts>=200){
    html+=`<div class="record-banner">
      <div style="font-size:22px;font-weight:800;color:#7a4f00">🏆 MAESTRO TIRADOR</div>
      <div style="font-size:13px;color:#a06800;margin-top:4px">¡Alcanzaste los 200 puntos!</div>
    </div>`;
  }

  html+=`<div class="card">
    <div class="card-header">Resumen personal</div>
    <div class="card-body">
      <div class="stat-row">
        <div class="stat-box" style="background:var(--gold-bg);border-color:var(--gold)">
          <div class="stat-val" style="color:var(--navy-dark)">${maxPts}</div>
          <div class="stat-lbl">Mejor</div>
        </div>

  // Gráfico: una línea por división
  if(allDivs.length>=2){

  cont.innerHTML=html;

  if(allDivs.length>=2){

  }
}

function dibujarGrafico(allDivs){
  const canvas=document.getElementById('chart-evol');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');

  const data=[...allDivs].reverse();
  const N=data.length;
  const W=canvas.parentElement.clientWidth-12;
  const H=220;
  canvas.width=W; canvas.height=H;

  const PAD={t:20,r:20,b:30,l:36};
  const cW=W-PAD.l-PAD.r;
  const cH=H-PAD.t-PAD.b;

  const pts=data.map(d=>d.totPts);
  const maxV=Math.max(...pts,50);
  const range=maxV||1;

  const xOf=i=>PAD.l+(N>1?i/(N-1):0.5)*cW;
  const yOf=v=>PAD.t+cH-((v/range)*cH);

  ctx.fillStyle='#f4f8fc';
  ctx.fillRect(0,0,W,H);

  ctx.strokeStyle='#c0d8ec'; ctx.lineWidth=1;
  [0,50,100,150,200].forEach(v=>{
    if(v>maxV+10) return;
    const y=yOf(v);
    ctx.beginPath(); ctx.moveTo(PAD.l,y); ctx.lineTo(W-PAD.r,y); ctx.stroke();
    ctx.fillStyle='#8a9ab0'; ctx.font='10px Segoe UI,sans-serif'; ctx.textAlign='right';
    ctx.fillText(v,PAD.l-4,y+3.5);
  });

  if(N>1){
    ctx.beginPath();
    ctx.moveTo(xOf(0),yOf(pts[0]));
    data.forEach((_,i)=>{ if(i>0) ctx.lineTo(xOf(i),yOf(pts[i])); });
    ctx.lineTo(xOf(N-1),PAD.t+cH);
    ctx.lineTo(PAD.l,PAD.t+cH);
    ctx.closePath();
    ctx.fillStyle='rgba(26,58,92,0.08)';
    ctx.fill();

    ctx.beginPath();
    ctx.strokeStyle='#1a3a5c'; ctx.lineWidth=2.5; ctx.lineJoin='round'; ctx.lineCap='round';
    data.forEach((d,i)=>{
      if(i===0) ctx.moveTo(xOf(i),yOf(pts[i]));
      else ctx.lineTo(xOf(i),yOf(pts[i]));
    });
    ctx.stroke();
  }

  data.forEach((d,i)=>{
    const x=xOf(i), y=yOf(pts[i]);
    const info=divInfo(d.div);
    // color por tipo
    const col=d.tipo==='torneo'?'#1a5fa8':'#1a7a3c';
    ctx.beginPath();
    ctx.arc(x,y,5,0,Math.PI*2);
    ctx.fillStyle=col; ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle='#122840'; ctx.font='bold 10px Segoe UI,sans-serif'; ctx.textAlign='center';
    ctx.fillText(pts[i],x,y-9);
  });

  ctx.fillStyle='#8a9ab0'; ctx.font='9px Segoe UI,sans-serif'; ctx.textAlign='center';
  const step=Math.max(1,Math.floor(N/5));
  data.forEach((d,i)=>{
    if(i%step===0 || i===N-1){
      const parts=d.fecha.split('-');
      ctx.fillText(`${parts[2]}/${parts[1]}`,xOf(i),H-4);
    }
  });

  ctx.font='10px Segoe UI,sans-serif'; ctx.textAlign='left';
  ctx.fillStyle='#1a7a3c'; ctx.beginPath(); ctx.arc(PAD.l+8,PAD.t+8,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#4a5568'; ctx.fillText('Práctica',PAD.l+16,PAD.t+12);
  ctx.fillStyle='#1a5fa8'; ctx.beginPath(); ctx.arc(PAD.l+80,PAD.t+8,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#4a5568'; ctx.fillText('Torneo',PAD.l+88,PAD.t+12);
}

/* ── CRONÓMETRO ── */
let timerInterval=null;
let timerSeconds=60;
let timerRunning=false;

function timerRender(){
  const el=document.getElementById('timer-display');
  const arc=document.getElementById('timer-arc');
  const lbl=document.getElementById('timer-label');
  const ico=document.getElementById('timer-icon');
  if(!el) return;
  const m=Math.floor(timerSeconds/60);
  const s=timerSeconds%60;
  el.textContent=m+':'+(s<10?'0':'')+s;
  // Arc: circumference = 2*PI*80 = 502.65
  const total=60;
  const pct=timerSeconds/total;
  const circ=502.65;
  if(arc) arc.setAttribute('stroke-dashoffset', circ*(1-pct));
  // Color feedback
  let col='#1a3a5c';
  if(timerSeconds<=10){ col='#a02020'; }
  else if(timerSeconds<=20){ col='#c8a020'; }
  el.setAttribute('fill',col);
  if(arc) arc.setAttribute('stroke',col);
  if(ico) ico.setAttribute('fill', timerRunning ? col : '#8a9ab0');
  if(lbl){
    if(timerRunning) lbl.textContent='tocá para pausar';
    else if(timerSeconds<60) lbl.textContent='tocá para continuar';
    else lbl.textContent='tocá para iniciar';
    lbl.setAttribute('fill','#8a9ab0');
  }
  if(ico) ico.textContent = timerRunning ? '⏸' : '▶';
}
function timerPlay(){
  if(timerRunning){
    clearInterval(timerInterval);
    timerInterval=null;
    timerRunning=false;
    timerRender();
  } else {
    if(timerSeconds<=0) timerSeconds=60;
    timerRunning=true;
    timerRender();
    timerInterval=setInterval(()=>{
      timerSeconds--;
      timerRender();
      if(timerSeconds<=0){
        clearInterval(timerInterval);
        timerInterval=null;
        timerRunning=false;
        if(navigator.vibrate) navigator.vibrate([300,100,300]);
        // show ¡Ya! briefly then auto-reset after 2s
        const el=document.getElementById('timer-display');
        const lbl=document.getElementById('timer-label');
        const ico=document.getElementById('timer-icon');
        if(el){ el.textContent='¡Ya!'; el.setAttribute('fill','#a02020'); }
        if(lbl){ lbl.textContent='tocá para iniciar'; }
        if(ico){ ico.textContent='▶'; ico.setAttribute('fill','#8a9ab0'); }
        setTimeout(()=>{
          timerSeconds=60;
          timerRender();
        },2000);
      }
    },1000);
  }
}
function timerReset(){
  clearInterval(timerInterval);
  timerInterval=null;
  timerRunning=false;
  timerSeconds=60;
  timerRender();
}
// Stop timer when leaving puntajes screen
function timerStop(){
  clearInterval(timerInterval);
  timerInterval=null;
  timerRunning=false;
}

/* ── UTILS ── */
function initials(nombre){
  return nombre.split(' ').slice(0,2).map(p=>p[0]||'').join('').toUpperCase()||'?';
}
function formatFecha(f){
  if(!f) return '';
  const d=new Date(f+'T12:00:00');
  return d.toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric'});
}

/* ── MODAL ── */
function abrirModal(msg,sub,btnTxt,btnColor,onConfirm){
  document.getElementById('modal-msg').textContent=msg;
  document.getElementById('modal-sub').textContent=sub;
  const btn=document.getElementById('modal-confirm-btn');
  btn.textContent=btnTxt;
  btn.style.background=btnColor;
  btn.style.color='#fff';
  btn.style.borderColor='transparent';
  btn.onclick=onConfirm;
  const cancelBtn=document.querySelector('.modal-btns .btn:first-child');
  if(cancelBtn) cancelBtn.style.display='';
  document.getElementById('modal-overlay').style.display='flex';
}
function cerrarModal(){
  document.getElementById('modal-overlay').style.display='none';
}
document.getElementById('modal-overlay').addEventListener('click',function(e){
  if(e.target===this) cerrarModal();
});
